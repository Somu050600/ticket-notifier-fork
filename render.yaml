services:
  - type: web
    name: ticketalert
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: gunicorn -c backend/gunicorn_config.py backend.app:app
    healthCheckPath: /health
    envVars:
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: USE_BROWSER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ticketalert-db
          property: connectionString

databases:
  - name: ticketalert-db
    databaseName: ticketalert
    user: ticketalert
